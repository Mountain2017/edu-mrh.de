build-online-ide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: martin-pabst/Online-IDE-new-compiler
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build-embedded
      - name: Patch base URL in includeIDE.js
        run: |
          sed -i 's|let base = "https://embed.learnj.de/include/";|let base = "https://edu-mrh.de/embed/include/";|' dist-embedded/includeIDE.js
      - uses: actions/upload-artifact@v4
        with:
          name: dist-online-ide-embedded
          path: dist-embedded/
          retention-days: 3

  deploy-online-ide:
    needs: build-online-ide
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-online-ide-embedded
          path: dist-embedded/
      - name: Deploy to Hetzner via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist-embedded/
          server-dir: /embed/include/
          timeout: 600000
          exclude: |
            **/*.map
