name: Sync, Build and Deploy from Upstream

on:
  push:
    branches:
      - main
  schedule:
    # Läuft jeden Tag um 04:00 Uhr nachts (UTC) automatisch
    - cron: '0 4 * * *'
  workflow_dispatch: # Erlaubt es Ihnen, den Build jederzeit manuell per Klick zu starten

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Eigenen Fork auschecken
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Mit dem Original-Repository (Upstream) abgleichen
    - name: Sync with Upstream
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        # Das Original-Repository als Quelle hinzufügen
        git remote add upstream https://github.com/martin-pabst/SQL-IDE.git
        git fetch upstream
        # Den main-Branch des Originals in den eigenen main-Branch mergen
        git checkout main
        git merge upstream/main --no-edit || echo "Keine neuen Änderungen oder Konflikt"
        git push origin main
      continue-on-error: true # Falls es keine Änderungen gab, läuft die Pipeline trotzdem weiter

    # 3. Node.js Umgebung einrichten
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 4. Abhängigkeiten installieren
    - name: Install Dependencies
      run: npm install

    # 5. Embedded-IDE Version bauen
    - name: Build Embedded IDE
      run: npm run build-embedded

    # 6. Fertige Dateien via SFTP zu Hetzner hochladen
    - name: Deploy to Hetzner via SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: sftp
        port: 22
        local-dir: ./dist/
        server-dir: /public_html/embed/sql-IDE-embedded/
