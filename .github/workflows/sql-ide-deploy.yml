name: Build and Deploy SQL-IDE (embedded)

on:
  schedule:
    # Jeden Tag um 04:00 Uhr (UTC)
    - cron: '0 4 * * *'
  workflow_dispatch: # Manueller Start jederzeit möglich

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: martin-pabst/SQL-IDE
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build-embedded
      - uses: actions/upload-artifact@v4
        with:
          name: dist-embedded
          path: dist-embedded/
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-embedded
          path: dist-embedded/
      - name: Deploy to Hetzner via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist-embedded/
          server-dir: /embed/sql-IDE-embedded/
          timeout: 600000
          exclude: |
            **/*.map
            
