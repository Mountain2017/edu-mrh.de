<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Stage plates: a plate composes itself across the five stages.
       Rim uses currentColor so it inherits text color; food wedges use the palette. -->

  <!-- Stage 0: the plate as it is today — empty, no judgment -->
  <symbol id="stage-0" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#fff" stroke="currentColor" stroke-width="3"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  </symbol>

  <!-- Stage 1: one easy win lands on the plate -->
  <symbol id="stage-1" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#fff" stroke="currentColor" stroke-width="3"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
    <path d="M50 50 L50 22 A28 28 0 0 1 74.2 36 Z" fill="#2E7A4D"/>
  </symbol>

  <!-- Stage 2: meals get composed — vegetables + grains -->
  <symbol id="stage-2" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#fff" stroke="currentColor" stroke-width="3"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
    <path d="M50 50 L50 22 A28 28 0 0 1 77.8 54.9 Z" fill="#2E7A4D"/>
    <path d="M50 50 L77.8 54.9 A28 28 0 0 1 36 74.2 Z" fill="#D9A94B"/>
  </symbol>

  <!-- Stage 3: nutrient awareness — protein joins -->
  <symbol id="stage-3" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#fff" stroke="currentColor" stroke-width="3"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
    <path d="M50 50 L50 22 A28 28 0 0 1 77.8 54.9 Z" fill="#2E7A4D"/>
    <path d="M50 50 L77.8 54.9 A28 28 0 0 1 36 74.2 Z" fill="#D9A94B"/>
    <path d="M50 50 L36 74.2 A28 28 0 0 1 26 33.5 Z" fill="#8E3A5F"/>
  </symbol>

  <!-- Stage 4: the personal plate — composed, with individual touches -->
  <symbol id="stage-4" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#fff" stroke="currentColor" stroke-width="3"/>
    <path d="M50 50 L50 22 A28 28 0 0 1 77.8 54.9 Z" fill="#2E7A4D"/>
    <path d="M50 50 L77.8 54.9 A28 28 0 0 1 36 74.2 Z" fill="#D9A94B"/>
    <path d="M50 50 L36 74.2 A28 28 0 0 1 26 33.5 Z" fill="#8E3A5F"/>
    <path d="M50 50 L26 33.5 A28 28 0 0 1 50 22 Z" fill="#1D5637"/>
    <circle cx="61" cy="35" r="2.6" fill="#fff" opacity="0.85"/>
    <circle cx="67" cy="58" r="2.6" fill="#fff" opacity="0.85"/>
    <circle cx="41" cy="63" r="2.6" fill="#fff" opacity="0.85"/>
    <circle cx="38" cy="38" r="2.6" fill="#fff" opacity="0.85"/>
  </symbol>
</svg>
