<!DOCTYPE html>
<!-- ================================================================
     VORLAGE: FREIE SEITE (komplett eigenes Design)
     ================================================================
     Manche Inhalte brauchen ein völlig eigenes Erscheinungsbild –
     ein Spiel, eine Simulation, ein immersives Lernmodul. Das ist
     ausdrücklich erlaubt. Es gibt nur EINE Regel:

         Die Basis-Bedienelemente (Zurück, Startseite, Impressum)
         müssen vorhanden sein.

     Dafür genügt die eine <script>-Zeile unten vor </body>. Sie fügt
     die Elemente dezent unten links ein – mit eigenem Styling,
     unabhängig vom Design der Seite. Baut die Seite selbst schon
     einen Impressum-Link oder Zurück-Button ein, erkennt das Skript
     das und fügt nichts doppelt hinzu.

     Ablageort wie immer:  <fach>/<jahrgangsstufe>/<thema>/….html
     Ausführliche Anleitung: /README.md im Repository.
     ================================================================ -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Titel nach dem Muster "Thema | Fach – edu-mrh.de" -->
    <title>Mein Thema | Fach – edu-mrh.de</title>
    <link rel="icon" type="image/png" href="https://edu-mrh.de/embed/icons/favicon.png">

    <style>
        /* Ab hier gehört die Seite ganz dir. */
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Freies Design – nur die Basis-Bedienelemente sind Pflicht.</h1>

    <!-- ============================================================
         PFLICHT: Basis-Bedienelemente (Zurück / Startseite / Impressum)
         Optional anpassbar, z. B.:
           data-back="../fach.html"   festes Zurück-Ziel
           data-position="right"      Ecke unten rechts statt links
         ============================================================ -->
    <script defer src="https://edu-mrh.de/controls.js"></script>

</body>
</html>
